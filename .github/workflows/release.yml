name: Deploy Extension (.pext)

on:
  push:
    tags:
      - 'v*' # Trigger build on any tag that starts with 'v', e.g., 'v1.0.0'

jobs:
  build-and-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Restore NuGet Packages
        run: nuget restore PlayniteExtensions.sln

      - name: Build All Extensions
        run: msbuild PlayniteExtensions.sln -p:Configuration=Release

      - name: Download Playnite Portable (Para extrair o Toolbox.exe)
        run: |
          # Baixando pacote do Playnite (Toolbox está embutido)
          Invoke-WebRequest -Uri "https://github.com/JosefNemec/Playnite/releases/download/10.35/Playnite1035.zip" -OutFile "playnite.zip"
          Expand-Archive "playnite.zip" -DestinationPath "playnite"

      - name: Pack BuscaDeJogosLocais (.pext)
        run: |
          .\playnite\Toolbox.exe pack "BuscaDeJogosLocais\bin\Release" ".\"

      - name: Pack HypervisorOverlay (.pext)
        run: |
          .\playnite\Toolbox.exe pack "HypervisorOverlay\bin\Release" ".\"

      - name: Pack RetrospectivaAnual (.pext)
        run: |
          .\playnite\Toolbox.exe pack "RetrospectiveSteam\bin\Release" ".\"
      
      - name: List Generated Files (Diagnostic)
        run: ls *.pext

      - name: Publish Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pext"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
